    <style>
        :root { --sidebar-width: 280px; }
        body { background-color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: white;
            border-right: 1px solid #dee2e6;
            z-index: 1000;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            position: relative;
        }
        .practice-card {
            border: none;
            border-radius: 15px;
            transition: all 0.3s ease;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .practice-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .btn-mode {
            text-align: left;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 15px;
            width: 100%;
            border: 1px solid transparent;
        }
        .btn-mode.active { background-color: #0d6efd; color: white; }
        .btn-mode:not(.active) { background-color: #f8f9fa; color: #495057; }
        .category-container { margin-left: 1rem; margin-bottom: 1.5rem; padding-left: 1rem; border-left: 2px solid #e9ecef; }
        .cat-link { display: block; padding: 5px 0; color: #6c757d; text-decoration: none; font-size: 0.9rem; }
        .cat-link:hover, .cat-link.active { color: #0d6efd; font-weight: 600; }
        .badge-id { background: #e9ecef; color: #495057; font-weight: bold; font-size: 0.75rem; }
        .criterion-tag {
            font-size: 0.65rem;
            margin-right: 4px;
            margin-bottom: 4px;
            display: inline-block;
            border: 1px solid #0dcaf0;
            color: #0dcaf0;
            background: rgba(13, 202, 240, 0.05);
            cursor: help;
        }
        .criterion-tag .remove-criterion {
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
            color: #dc3545;
        }
        .criterion-tag .remove-criterion:hover { color: #a71d2a; }
        .popover {
            pointer-events: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #0dcaf0;
            max-width: 450px;
            font-size: 0.9rem;
        }
        .popover-header { background-color: #0dcaf0; color: white; font-weight: bold; }
        .popover-body { white-space: normal; word-wrap: break-word; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
        .btn-add-criteria {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            white-space: nowrap;
        }
        .criteria-checkbox-list {
            max-height: 65vh;
            overflow-y: auto;
            overflow-x: hidden;
        }
        #addCriteriaModal .modal-body {
            overflow: visible !important;
        }
        #addCriteriaModal .form-check {
            overflow: visible !important;
            max-width: 100% !important;
        }
        #addCriteriaModal .form-check-label {
            white-space: normal !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            overflow: visible !important;
            display: inline-block !important;
            max-width: calc(100% - 1.75rem) !important;
        }
        #addCriteriaModal .form-check-label small {
            display: block !important;
            line-height: 1.5;
            white-space: normal !important;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .firebase-connected #firebaseStatusDot { background: #198754 !important; animation: none !important; }
        .firebase-connected #firebaseStatusText { color: #198754 !important; }
        .firebase-disconnected #firebaseStatusDot { background: #dc3545 !important; animation: none !important; }
        .firebase-disconnected #firebaseStatusText { color: #dc3545 !important; }
        .firebase-local #firebaseStatusDot { background: #fd7e14 !important; animation: none !important; }
        .firebase-local #firebaseStatusText { color: #b8680d !important; }
        /* Colores pastel por categoría */
        .cat-leds { --cat-border: #f5c6c6; --cat-accent: #d9534f; --cat-text: #a94442; }
        .cat-sensores { --cat-border: #b8daff; --cat-accent: #2a8fd4; --cat-text: #1a5f8e; }
        .cat-movimiento { --cat-border: #b1dfbb; --cat-accent: #3d8b4f; --cat-text: #2d6b3f; }
        .cat-pantallas { --cat-border: #f5d5b0; --cat-accent: #d4850a; --cat-text: #a56808; }
        .cat-proyectos { --cat-border: #d0c0e8; --cat-accent: #7b4faa; --cat-text: #5e3a82; }
        .cat-otros { --cat-border: #b0e8e8; --cat-accent: #1a9e9e; --cat-text: #147575; }
        .practice-card.cat-leds { border-top: 4px solid var(--cat-accent); }
        .practice-card.cat-sensores { border-top: 4px solid var(--cat-accent); }
        .practice-card.cat-movimiento { border-top: 4px solid var(--cat-accent); }
        .practice-card.cat-pantallas { border-top: 4px solid var(--cat-accent); }

        .practice-card.cat-otros { border-top: 4px solid var(--cat-accent); }
        .practice-card .cat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 6px; }
        .cat-leds .cat-label { background: var(--cat-border); color: var(--cat-text); }
        .cat-sensores .cat-label { background: var(--cat-border); color: var(--cat-text); }
        .cat-movimiento .cat-label { background: var(--cat-border); color: var(--cat-text); }
        .cat-pantallas .cat-label { background: var(--cat-border); color: var(--cat-text); }
        .cat-proyectos .cat-label { background: var(--cat-border); color: var(--cat-text); }
        .cat-otros .cat-label { background: var(--cat-border); color: var(--cat-text); }
    </style>
</head>

<div class="sidebar">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark mb-1"><i class="fas fa-microchip text-primary me-2"></i>ArduinoBlocks</h4>
        <span class="badge bg-light text-muted border">13 criterios TEC4</span>
    </div>
    
    <div id="navigation-modes">

            <i class="fas fa-user-graduate me-2"></i> Prácticas de 4º ESO

        <div id="categories-class" class="category-container"></div>

</div>

<div class="main-content">
    <div class="container-fluid">

                <span id="firebaseStatusDot" class="rounded-circle d-inline-block" style="width:8px;height:8px;background:#ffc107;animation:pulse-dot 1.5s infinite;"></span>
                <span id="firebaseStatusText" class="fw-semibold" style="color:#b8860b;font-size:0.75rem;">Conectando...</span>

        <header class="mb-5">

                <small class="text-muted"><i class="fas fa-info-circle"></i> Pasa el ratón por los criterios para ver su descripción.</small>
            </div>
        </header>
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 row-cols-xxl-4 g-4" id="cardsGrid"></div>
    </div>
</div>

<!-- MODAL para añadir criterios extra -->
<div class="modal fade" id="addCriteriaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Añadir criterios de evaluación</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

        </div>
    </div>
</div>

<script>

    //   3. En Project Settings > General > Your apps > Web app, registra la app
    //   4. Copia el objeto firebaseConfig y pégalo aquí
    //   5. En Reglas de la base de datos, pon: { "rules": { ".read": true, ".write": true } }
    //
    // Si no configuras Firebase, la app usará localStorage local (sin sincronizar).
    // --------------------------------------------------------------

    // Carga Firebase de forma dinámica solo si está configurado (no bloquea la carga de la página)
    async function initFirebase() {
        const firebaseNeedsInit = firebaseConfig.apiKey !== "TU_API_KEY_AQUI";
        if (!firebaseNeedsInit) {
            console.warn("Firebase no configurado. Se usará localStorage (sin sincronización entre dispositivos).");
            return false;
        }
        try {
            // Cargar SDKs de Firebase dinámicamente
            await Promise.all([
                loadScript("https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"),
                loadScript("https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js")
            ]);
            firebase.initializeApp(firebaseConfig);
            firebaseDB = firebase.database();
            console.log("Firebase inicializado. Sincronización entre dispositivos activada.");
            return true;
        } catch (e) {
            console.error("Error al inicializar Firebase:", e.message);
            return false;
        }
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = () => reject(new Error("No se pudo cargar: " + src));
            document.head.appendChild(s);
        });
    }

                "TEC.4.6.3": "Identificar y valorar la repercusión y los beneficios del desarrollo de proyectos tecnológicos de carácter social, por medio de comunidades abiertas, acciones de voluntariado o proyectos de servicio a la comunidad."
                };

    // --------------------------------------------------------------
    // PERSISTENCIA: criterios adicionales por práctica
    // --------------------------------------------------------------
    let additionalCriteriaPerPractice = {}; // { "P01_L": ["TEC.4.5.1", ...] }

    function loadStorage() {
        // Cargar datos desde localStorage siempre de forma inmediata
        try {
            const stored = localStorage.getItem("additionalCriteriaPerPractice");
            if (stored) additionalCriteriaPerPractice = JSON.parse(stored);
            else additionalCriteriaPerPractice = {};
        } catch (e) {
            console.error("Error al leer localStorage, se reinician los datos:", e.message);
            additionalCriteriaPerPractice = {};
            localStorage.removeItem("additionalCriteriaPerPractice");
        }
        lastSyncHash = JSON.stringify(additionalCriteriaPerPractice);
    }

    // Actualiza el indicador visual de estado de Firebase
    function updateFirebaseStatus(status) {
        const container = document.getElementById('firebaseStatus');
        const text = document.getElementById('firebaseStatusText');
        container.className = 'd-flex align-items-center gap-2 small rounded-3 px-3 py-2';
        if (status === 'connected') {
            container.classList.add('firebase-connected');
            container.style.background = 'rgba(25,135,84,0.08)';
            container.style.borderColor = 'rgba(25,135,84,0.25)';
            text.innerHTML = '<i class="fas fa-cloud me-1"></i> Firebase conectado';
        } else if (status === 'error') {
            container.classList.add('firebase-disconnected');
            container.style.background = 'rgba(220,53,69,0.08)';
            container.style.borderColor = 'rgba(220,53,69,0.25)';
            text.innerHTML = '<i class="fas fa-exclamation-triangle me-1"></i> Sin conexión';
        } else if (status === 'not-configured') {
            container.classList.add('firebase-local');
            container.style.background = 'rgba(253,126,20,0.08)';
            container.style.borderColor = 'rgba(253,126,20,0.25)';
            text.innerHTML = '<i class="fas fa-hdd me-1"></i> Modo local';
        }
    }

    // Conecta Firebase en segundo plano (no bloquea la UI)
    async function connectFirebaseSync() {
        const ok = await initFirebase();
        if (ok) {
            try {
                // Verificar que la conexión funciona leyendo un dato
                await firebaseDB.ref('.info/connected').once('value');
                useFirebase = true;
                updateFirebaseStatus('connected');
                // Escuchar cambios en tiempo real desde Firebase
                firebaseDB.ref('additionalCriteriaPerPractice').on('value', (snapshot) => {
                    const data = snapshot.val() || {};
                    const newHash = JSON.stringify(data);
                    if (newHash !== lastSyncHash) {
                        lastSyncHash = newHash;
                        additionalCriteriaPerPractice = data;
                        localStorage.setItem("additionalCriteriaPerPractice", newHash);
                        if (window.__appInitialized) {
                            renderPractices();
                        }
                    }
                });
                // Detectar desconexión
                firebaseDB.ref('.info/connected').on('value', (snap) => {
                    if (snap.val() === false && useFirebase) {
                        updateFirebaseStatus('error');
                    } else if (snap.val() === true) {
                        updateFirebaseStatus('connected');
                    }
                });
            } catch (e) {
                console.error("Error al verificar conexión Firebase:", e.message);
                useFirebase = false;
                updateFirebaseStatus('error');
            }
        } else {
            updateFirebaseStatus('not-configured');
        }
    }

    function saveAdditionalCriteria() {
        const dataStr = JSON.stringify(additionalCriteriaPerPractice);
        lastSyncHash = dataStr;
        // Siempre guardar en localStorage como respaldo local
        localStorage.setItem("additionalCriteriaPerPractice", dataStr);
        // Si Firebase está activo, sincronizar a la nube
        if (useFirebase) {
            firebaseDB.ref('additionalCriteriaPerPractice').set(additionalCriteriaPerPractice);
        }
        renderPractices();
    }

    // Obtiene todos los criterios de una práctica (originales + extras - eliminados)
    function getPracticeCriteria(practice) {
        const base = practice.criteria || [];
        const extra = additionalCriteriaPerPractice[practice.id] || [];
        const removed = additionalCriteriaPerPractice[practice.id + '_removed'] || [];
        const removedSet = new Set(removed);
        // Eliminar duplicados y excluir los eliminados por el usuario
        return [...new Set([...base, ...extra])].filter(c => !removedSet.has(c));
    }

    // Añade uno o varios criterios a una práctica
    function addCriteriaToPractice(practiceId, criteriaList) {
        if (!additionalCriteriaPerPractice[practiceId]) {
            additionalCriteriaPerPractice[practiceId] = [];
        }
        let added = false;
        criteriaList.forEach(criterion => {
            if (!additionalCriteriaPerPractice[practiceId].includes(criterion)) {
                additionalCriteriaPerPractice[practiceId].push(criterion);
                added = true;
            }
            // Si el criterio estaba en la lista de eliminados, quitarlo de ahí
            if (additionalCriteriaPerPractice[practiceId + '_removed']) {
                additionalCriteriaPerPractice[practiceId + '_removed'] = additionalCriteriaPerPractice[practiceId + '_removed'].filter(c => c !== criterion);
                if (additionalCriteriaPerPractice[practiceId + '_removed'].length === 0) {
                    delete additionalCriteriaPerPractice[practiceId + '_removed'];
                }
            }
        });
        if (added) {
            saveAdditionalCriteria(); // ya llama a renderPractices()
        }
    }

    // Elimina un criterio (base o adicional) de una práctica
    function removeCriterionFromPractice(practiceId, criterionCode) {
        // Primero: si es un criterio adicional, quitarlo de la lista de extras
        if (additionalCriteriaPerPractice[practiceId]) {
            additionalCriteriaPerPractice[practiceId] = additionalCriteriaPerPractice[practiceId].filter(c => c !== criterionCode);
            if (additionalCriteriaPerPractice[practiceId].length === 0) {
                delete additionalCriteriaPerPractice[practiceId];
            }
        }
        // Segundo: registrar el criterio como eliminado (para criterios base y también extras)
        if (!additionalCriteriaPerPractice[practiceId + '_removed']) {
            additionalCriteriaPerPractice[practiceId + '_removed'] = [];
        }
        if (!additionalCriteriaPerPractice[practiceId + '_removed'].includes(criterionCode)) {
            additionalCriteriaPerPractice[practiceId + '_removed'].push(criterionCode);
        }
        saveAdditionalCriteria(); // ya llama a renderPractices()
    }

    // --------------------------------------------------------------
    // VARIABLES GLOBALES DE INTERFAZ
    // --------------------------------------------------------------
    let currentMode = 'class';
    let currentCategory = 'all';
    let currentPracticeIdForModal = null;

    // --------------------------------------------------------------
    // FUNCIONES DE RENDERIZADO
    // --------------------------------------------------------------
    function changeMode(mode) {
        currentMode = mode;
        currentCategory = 'all';
        document.getElementById('mode-class-btn').classList.toggle('active', mode === 'class');
        document.getElementById('mode-all-btn').classList.toggle('active', mode === 'all');
        document.getElementById('categories-class').style.display = mode === 'class' ? 'block' : 'none';
        document.getElementById('categories-all').style.display = mode === 'all' ? 'block' : 'none';
        document.getElementById('viewTitle').innerText = mode === 'class' ? "Prácticas de 4º ESO" : "Banco de Recursos Completo";
        document.getElementById('viewDesc').innerText = mode === 'class' 
            ? "Programación prioritaria ordenada por la imagen de referencia." 
            : "Listado completo de todas las prácticas.";
        renderCategories();
        renderPractices();
    }

    function renderCategories() {
        const containerId = currentMode === 'class' ? 'categories-class' : 'categories-all';
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        const allLink = document.createElement('a');
        allLink.className = `cat-link ${currentCategory === 'all' ? 'active' : ''}`;
        allLink.innerHTML = "◈ Ver todas";
        allLink.href = "#";
        allLink.onclick = (e) => { e.preventDefault(); currentCategory = 'all'; renderCategories(); renderPractices(); };
        container.appendChild(allLink);

        const usedCats = new Set();
        practicesData.forEach(p => {
            if (currentMode === 'all' || classPracticesIds.includes(p.id)) usedCats.add(p.category);
        });
        Object.keys(categoriesMap).forEach(catId => {
            if (usedCats.has(catId)) {
                const link = document.createElement('a');
                link.className = `cat-link ${currentCategory === catId ? 'active' : ''}`;
                link.innerHTML = categoriesMap[catId];
                link.href = "#";
                link.onclick = (e) => { e.preventDefault(); currentCategory = catId; renderCategories(); renderPractices(); };
                container.appendChild(link);
            }
        });
    }

    function renderPractices() {
        const grid = document.getElementById('cardsGrid');
        const search = document.getElementById('searchBox').value.toLowerCase();
        grid.innerHTML = '';

        let source = [];
        if (currentMode === 'class') {
            source = classPracticesIds.map(id => practicesData.find(p => p.id === id)).filter(p => p);
        } else {
            source = [...practicesData];
        }

        const filtered = source.filter(p => {
            const matchesCat = (currentCategory === 'all') || (p.category === currentCategory);
            const matchesSearch = p.title.toLowerCase().includes(search) || p.id.toLowerCase().includes(search);
            return matchesCat && matchesSearch;
        });

        document.getElementById('counter').innerText = `${filtered.length} recursos mostrados`;

        filtered.forEach(p => {
            const practiceCrit = getPracticeCriteria(p);
            // Determinar qué criterios de los 13 NO están asignados
            const missingCriteria = ALL_CRITERIA_CODES.filter(c => !practiceCrit.includes(c));
            const showAddButton = missingCriteria.length > 0;

            const cardCol = document.createElement('div');
            cardCol.className = 'col';
            cardCol.innerHTML = `
                <div class="card h-100 practice-card cat-${p.category}">
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="badge badge-id rounded px-2 py-1">${p.id}</span>
                            <span class="cat-label">${categoriesMap[p.category] || p.category}</span>
                        </div>
                        <h5 class="card-title fw-bold text-dark mb-3">${p.title}</h5>
                        <div class="mb-3 d-flex flex-wrap align-items-center gap-1" id="criteria-container-${p.id}">
                            ${practiceCrit.map(c => {
                                const removeBtn = `<span class="remove-criterion" data-practice="${p.id}" data-criterion="${c}">❌</span>`;
                                return `<span class="badge criterion-tag rounded-pill px-2 py-1" data-bs-toggle="popover" data-bs-trigger="hover" title="${c}" data-bs-content="${criteriaDescriptions[c] || 'Descripción no disponible.'}">
                                            ${c} ${removeBtn}
                                        </span>`;
                            }).join('')}
                            ${showAddButton ? `<button class="btn btn-sm btn-outline-success btn-add-criteria ms-1" data-practice-id="${p.id}" title="Añadir criterios extra"><i class="fas fa-plus"></i> Criterio(s)</button>` : ''}
                        </div>
                        <div class="mt-auto">
                            <a href="${p.url}" target="_blank" class="btn btn-outline-primary w-100 rounded-pill py-2 fw-bold">
                                Ver Práctica <i class="fas fa-external-link-alt ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(cardCol);
        });

        // Destruir popovers anteriores para evitar acumulación y persistencia
        document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el => {
            const existing = bootstrap.Popover.getInstance(el);
            if (existing) existing.dispose();
        });

        // Inicializar popovers (hover) con retardo mínimo para ocultar rápido
        const popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
        popoverTriggerList.map(el => new bootstrap.Popover(el, {
            trigger: 'hover',
            placement: 'top',
            html: false,
            delay: { show: 250, hide: 80 }
        }));

        // Ocultar cualquier popover visible al salir de los criterios
        document.querySelectorAll('[id^="criteria-container-"]').forEach(el => {
            el.addEventListener('mouseleave', () => {
                document.querySelectorAll('.popover.show').forEach(pop => {
                    pop.classList.remove('show');
                });
            });
        });

        // Eventos para botones "Añadir criterio(s)"
        document.querySelectorAll('.btn-add-criteria').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const practiceId = btn.getAttribute('data-practice-id');
                currentPracticeIdForModal = practiceId;
                const practice = practicesData.find(p => p.id === practiceId);
                if (!practice) return;
                const currentCrit = getPracticeCriteria(practice);
                const available = ALL_CRITERIA_CODES.filter(c => !currentCrit.includes(c));
                const checklistDiv = document.getElementById('criteriaChecklist');
                checklistDiv.innerHTML = '';
                if (available.length === 0) {
                    checklistDiv.innerHTML = '<p class="text-muted">No hay criterios disponibles para añadir (ya están todos).</p>';
                } else {
                    available.forEach(code => {
                        const desc = criteriaDescriptions[code];
                        const div = document.createElement('div');
                        div.className = 'form-check mb-3';
                        div.innerHTML = `
                            <input class="form-check-input" type="checkbox" value="${code}" id="chk_${code}">
                            <label class="form-check-label" for="chk_${code}" style="white-space:normal; word-break:break-word; overflow-wrap:break-word;">
                                <strong>${code}</strong><br><small class="text-muted" style="white-space:normal;">${desc}</small>
                            </label>
                        `;
                        checklistDiv.appendChild(div);
                    });
                }
                new bootstrap.Modal(document.getElementById('addCriteriaModal')).show();
            });
        });

        // Eventos para eliminar criterios adicionales (delegación)
        document.querySelectorAll('.remove-criterion').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const practiceId = el.getAttribute('data-practice');
                const criterion = el.getAttribute('data-criterion');
                if (confirm(`¿Eliminar el criterio ${criterion} de esta práctica?`)) {
                    removeCriterionFromPractice(practiceId, criterion);
                }
            });
        });
    }

    // --------------------------------------------------------------
    // INICIALIZACIÓN Y EVENTOS
    // --------------------------------------------------------------
    window.onload = () => {
        loadStorage();
        changeMode('class');
        window.__appInitialized = true;

        // Confirmar añadir criterios desde el modal
        document.getElementById('confirmAddCriteria').addEventListener('click', () => {
            if (currentPracticeIdForModal) {
                const selected = [];
                document.querySelectorAll('#criteriaChecklist input[type="checkbox"]:checked').forEach(cb => {
                    selected.push(cb.value);
                });
                if (selected.length > 0) {
                    addCriteriaToPractice(currentPracticeIdForModal, selected);
                } else {
                    alert("No has seleccionado ningún criterio.");
                }
            }
            bootstrap.Modal.getInstance(document.getElementById('addCriteriaModal')).hide();
        });

        // Buscador
        document.getElementById('searchBox').addEventListener('input', renderPractices);

        // Conectar Firebase en segundo plano (no bloquea la carga)
        connectFirebaseSync();
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Registro del Service Worker para PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then((reg) => {
                console.log('Service Worker registrado:', reg.scope);
            }).catch((err) => {
                console.warn('Service Worker no registrado:', err.message);
            });
        });
    }
</script>
</body>
